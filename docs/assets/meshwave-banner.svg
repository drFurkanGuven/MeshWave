<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-label="MeshWave">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="45%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wave2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="40%" stop-color="#58a6ff"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="mesh" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.1" fill="#58a6ff" opacity="0.18"/>
      <path d="M14 0 L14 28 M0 14 L28 14" stroke="#58a6ff" stroke-width="0.35" opacity="0.08"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="280" rx="18" fill="url(#bg)"/>
  <rect width="920" height="280" rx="18" fill="url(#mesh)"/>

  <!-- ambient glow -->
  <ellipse cx="460" cy="120" rx="320" ry="90" fill="url(#glow)" filter="url(#soft)"/>

  <!-- LoRa arcs -->
  <g fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M120 175 Q120 95 200 95" stroke="url(#wave1)" stroke-width="2.5"/>
    <path d="M105 175 Q105 75 215 75" stroke="url(#wave1)" stroke-width="1.8" opacity="0.7"/>
    <path d="M90 175 Q90 55 230 55" stroke="url(#wave1)" stroke-width="1.2" opacity="0.45"/>
    <circle cx="120" cy="175" r="5" fill="#58a6ff" stroke="none" opacity="0.9"/>
  </g>
  <g fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M800 175 Q800 95 720 95" stroke="url(#wave2)" stroke-width="2.5"/>
    <path d="M815 175 Q815 75 705 75" stroke="url(#wave2)" stroke-width="1.8" opacity="0.7"/>
    <path d="M830 175 Q830 55 690 55" stroke="url(#wave2)" stroke-width="1.2" opacity="0.45"/>
    <circle cx="800" cy="175" r="5" fill="#22d3ee" stroke="none" opacity="0.9"/>
  </g>

  <!-- main waves -->
  <path d="M0 210 C120 150 200 250 320 195 C440 140 520 240 640 188 C760 136 840 220 920 175 L920 280 L0 280 Z"
        fill="url(#wave1)" opacity="0.22"/>
  <path d="M0 225 C140 175 230 255 360 210 C490 165 570 245 700 200 C790 170 860 230 920 205"
        fill="none" stroke="url(#wave1)" stroke-width="3.5" opacity="0.85"/>
  <path d="M0 242 C150 205 250 270 390 235 C530 200 610 265 760 230 C830 215 880 250 920 238"
        fill="none" stroke="url(#wave2)" stroke-width="2.2" opacity="0.65"/>

  <!-- mesh nodes -->
  <g opacity="0.9">
    <circle cx="248" cy="118" r="4" fill="#58a6ff"/>
    <circle cx="340" cy="98" r="3" fill="#22d3ee"/>
    <circle cx="460" cy="88" r="5" fill="#a78bfa"/>
    <circle cx="580" cy="98" r="3" fill="#22d3ee"/>
    <circle cx="672" cy="118" r="4" fill="#58a6ff"/>
    <path d="M248 118 L340 98 L460 88 L580 98 L672 118" stroke="#58a6ff" stroke-width="1.2" opacity="0.45" fill="none"/>
    <path d="M340 98 L460 130 L580 98" stroke="#22d3ee" stroke-width="1" opacity="0.35" fill="none"/>
  </g>

  <!-- title -->
  <text x="460" y="118" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="54" font-weight="700" letter-spacing="6" fill="url(#title)">MESH·WAVE</text>
  <text x="460" y="152" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="15" letter-spacing="4" fill="#8b949e">LOCAL-FIRST LORA MESH MESSAGING</text>

  <!-- UART / SPI hint -->
  <text x="460" y="248" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#6e7681">
    UART E220  &#9670;  SPI SX1278  &#9670;  ESP32
  </text>
</svg>
