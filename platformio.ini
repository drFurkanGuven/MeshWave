; =============================================================================
; LoRaLink — PlatformIO Configuration (Phase 3)
; =============================================================================

[platformio]
default_envs = cardputer
description = LoRaLink — local LoRa chat (Cardputer ↔ T3 Gateway)

; Defaults inherited by all [env:*] below
[env]
platform         = espressif32@6.7.0
framework        = arduino
monitor_speed    = 115200
monitor_filters  = esp32_exception_decoder, time
extra_scripts    = pre:scripts/check_env.py
lib_ldf_mode     = deep+

build_flags =
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/lib/common
    -I ${PROJECT_DIR}/lib/drivers/radio
    -I ${PROJECT_DIR}/lib/transport
    -I ${PROJECT_DIR}/lib/protocol
    -D LORALINK_BUILD
    -D CORE_DEBUG_LEVEL=3
    -std=gnu++17

build_unflags =
    -std=gnu++11

; -----------------------------------------------------------------------------
; Cardputer — Device A (Terminal)
; -----------------------------------------------------------------------------
[env:cardputer]
board            = esp32-s3-devkitc-1
upload_speed     = 1500000
board_build.partitions = partitions_8mb.csv
board_build.filesystem = littlefs

build_flags =
    ${env.build_flags}
    -D BOARD_CARDPUTER
    -D ROLE_TERMINAL
    -D HAS_E220=1
    -D HAS_SX1278=0
    -D HAS_MESSAGE_STORE=1
    -I ${PROJECT_DIR}/boards/cardputer

build_src_filter =
    +<*>
    -<main_gateway.cpp>
    -<app/gateway_app.cpp>
    -<protocol_runtime.cpp>

lib_deps =
    m5stack/M5Unified @ ^0.2.2
    m5stack/M5Cardputer @ ^1.0.3
    https://github.com/m5stack/M5-LoRa-E220.git
    file://${PROJECT_DIR}/lib/drivers/radio
    file://${PROJECT_DIR}/lib/drivers/e220
    file://${PROJECT_DIR}/lib/common
    file://${PROJECT_DIR}/lib/protocol
    file://${PROJECT_DIR}/lib/transport
    file://${PROJECT_DIR}/lib/config
    file://${PROJECT_DIR}/lib/chat
    file://${PROJECT_DIR}/lib/storage
    file://${PROJECT_DIR}/lib/display
    file://${PROJECT_DIR}/lib/keyboard

lib_ignore =
    loralink-sx1278
    sx1278
    drivers/sx1278

; -----------------------------------------------------------------------------
; Gateway — Device B (T3 LoRa32 V1.6.1)
; -----------------------------------------------------------------------------
[env:gateway]
board            = ttgo-lora32-v21
upload_speed     = 921600
board_build.partitions = partitions_4mb.csv
board_build.filesystem = littlefs

build_flags =
    ${env.build_flags}
    -D BOARD_T3_V161
    -D ROLE_GATEWAY
    -D HAS_E220=0
    -D HAS_SX1278=1
    -D HAS_MESSAGE_STORE=1
    -D HAS_WEB_SERVER=1
    -I ${PROJECT_DIR}/boards/t3_v161

build_src_filter =
    +<*>
    -<main_cardputer.cpp>
    -<app/cardputer_app.cpp>
    -<protocol_runtime.cpp>

lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    olikraus/U8g2 @ ^2.35.19
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESPAsyncWebServer @ ^1.2.4
    file://${PROJECT_DIR}/lib/drivers/radio
    file://${PROJECT_DIR}/lib/drivers/sx1278
    file://${PROJECT_DIR}/lib/config
    file://${PROJECT_DIR}/lib/common
    file://${PROJECT_DIR}/lib/protocol
    file://${PROJECT_DIR}/lib/transport
    file://${PROJECT_DIR}/lib/chat
    file://${PROJECT_DIR}/lib/storage
    file://${PROJECT_DIR}/lib/wifi
    file://${PROJECT_DIR}/lib/webserver
    file://${PROJECT_DIR}/lib/websocket

lib_ignore =
    loralink-e220
    e220
    drivers/e220
    M5Unified
    M5Cardputer

; Web UI: pio run -e gateway -t buildfs && pio run -e gateway -t uploadfs
